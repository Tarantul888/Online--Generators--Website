<h1>Idea Generator</h1>

<p>Click the button to get a random idea</p>

<button onclick="generateIdea()">Generate Idea</button>

<p id="idea"></p>

<script>

let ideas=[
"Start a YouTube channel",
"Create a mobile app",
"Build a blog about gaming",
"Create a study website",
"Start a meme page",
"Create a podcast",
"Build a productivity app",
"Create a fitness blog",
"Make a small online game",
"Start a tech review website"
];

function generateIdea(){

let random=ideas[Math.floor(Math.random()*ideas.length)];

document.getElementById("idea").innerText=random;

}

</script>
