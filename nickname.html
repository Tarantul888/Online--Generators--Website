<h1>Nickname Generator</h1>

<button onclick="generateNick()">Generate Nickname</button>

<p id="nick"></p>

<script>

let first=[
"Shadow",
"Dark",
"Fire",
"Ice",
"Silent",
"Crazy",
"Ghost"
];

let second=[
"Wolf",
"Dragon",
"Tiger",
"Sniper",
"Ninja",
"Hunter",
"Blade"
];

function generateNick(){

let name=
first[Math.floor(Math.random()*first.length)] +
second[Math.floor(Math.random()*second.length)] +
Math.floor(Math.random()*100);

document.getElementById("nick").innerText=name;

}

</script>
